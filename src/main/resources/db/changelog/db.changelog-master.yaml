databaseChangeLog:
  - changeSet:
        id: 20240702-create-client-table
        author: cyril
        changes:
          - createTable:
              tableName: client
              columns:
                - column:
                    name: id
                    type: int
                    autoIncrement: true
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: firstname
                    type: varchar(255)
                    constraints:
                      nullable: false
                - column:
                      name: lastname
                      type: varchar(255)
                      constraints:
                        nullable: false
                - column:
                    name: address
                    type: varchar(255)
                    constraints:
                      nullable: true
                - column:
                    name: city
                    type: varchar(255)
                    constraints:
                      nullable: true
                - column:
                    name: zip_code
                    type: varchar(255)
                    constraints:
                      nullable: true
  - changeSet:
      id: load-data
      author: cyril
      changes:
        - loadData:
            tableName: client
            file: /db/clients.csv
            separator: ";"
